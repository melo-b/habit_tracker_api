

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      # This ensures your database data isn't wiped out every time the container restarts
      - postgres_data:/var/lib/postgresql/data
      
  web:
    build: .
    command: gunicorn core.wsgi --bind 0.0.0.0:8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      
volumes:
  postgres_data: